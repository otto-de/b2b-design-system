on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node Version'
        required: true
        type: string

env:
  TRIVY_VERSION: v0.68.1
  TRIVY_ACTION_SHA: 243e42e81d0be75e0e7425e7735c0c2e22b67351

jobs:
  shai-hulud-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Shai Hulud script dependencies
        run: |
          # Install runtime deps required by the downloaded scanner script without modifying package.json
          npm install --no-save js-yaml

      - name: Download Shai Hulud scan script
        run: |
          curl -fsSL https://raw.githubusercontent.com/otto-de/OreNPMGuard/refs/heads/main/shai_hulud_scanner.js -o shai-hulud-scan.js

      - name: Run Shai Hulud scan
        env:
          PROJECT_ROOT: ${{ github.workspace }}
        run: |
          node shai-hulud-scan.js "$PROJECT_ROOT"
  build-sanity-check:
    name: Build Sanity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Use Cache dependencies
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/**/node_modules
          key: modules-${{ hashFiles('package-lock.json') }}

      - name: Build all workspaces
        run: npm run build -ws

      - name: Fail on diff
        run: |
          git add .
          git diff --cached --name-only | sed -E 's/^(.*)$/::error file=\1,title=Diff detected::Please run `npm run build` and commit the changes./'
          git diff --cached --name-only --exit-code

  security-lint-and-test:
    name: Security Audit, Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use cached dependencies
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/**/node_modules
          key: modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=critical -ws
        continue-on-error: false

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        continue-on-error: false

  docker-build-and-scan:
    name: Build Docker Image and Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Use cached dependencies
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./packages/**/node_modules
          key: modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Components and Storybook Docs
        run: |
          npm run build
          cd packages/core-components
          npm run build:storybook
          mkdir -p docs-build/design-system
          cp -r dist/* docs-build/design-system/

      - name: Build Docker Image
        run: |
          echo "🐳 Building Docker image for validation..."
          docker build -t b2b-design-system-pr:${{ github.sha }} .

      - name: Verify Trivy action integrity
        run: |
          TRIVY_ACTION_VERSION="0.35.0"
          TRIVY_ACTION_EXPECTED_SHA="57a97c7e7821a5776cebc9bb87c984fa69cba8f1"
          TRIVY_ACTION_ACTUAL_SHA=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/aquasecurity/trivy-action/git/ref/tags/${TRIVY_ACTION_VERSION}" \
              | jq -r '.object.sha')

          echo "Expected SHA : $TRIVY_ACTION_EXPECTED_SHA"
          echo "Actual SHA   : $TRIVY_ACTION_ACTUAL_SHA"

          if [ "$TRIVY_ACTION_ACTUAL_SHA" != "$TRIVY_ACTION_EXPECTED_SHA" ]; then
              echo "❌ SHA mismatch for aquasecurity/trivy-action@$TRIVY_ACTION_VERSION – aborting pipeline."
              exit 1
          fi

          echo "✅ SHA verified – aquasecurity/trivy-action@$TRIVY_ACTION_VERSION matches pinned SHA."

      - name: Run vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'image'
          ignore-unfixed: false
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'library,os'
          scan-ref: 'b2b-design-system-pr:${{ github.sha }}'
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true