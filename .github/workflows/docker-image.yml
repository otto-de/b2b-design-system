on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node Version'
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SERVICE_NAME: b2bds-docs
  TRIVY_ACTION_VERSION: v0.35.0
  EXPECTED_SHA: 57a97c7e7821a5776cebc9bb87c984fa69cba8f1

jobs:
  build_and_publish_image:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    outputs:
      PAGES_URL: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Use cached dependencies
        id: node-modules-cache
        uses: actions/cache@v3
        with:
          path: |
            ./node_modules
            ./packages/**/node_modules
          key: modules-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: |
          npm run build
          cd packages/core-components
          npm run build:storybook
          cp -r dist docs-build/design-system

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=b2bds-docs
            org.opencontainers.image.vendor=ottoopensource

      # NEW: Build image locally (no push) for Trivy scan
      - name: Build Docker image for scan (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify Trivy action SHA
        run: |
          ACTUAL_SHA=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/aquasecurity/trivy-action/git/ref/tags/${{ env.TRIVY_ACTION_VERSION }}" \
            | jq -r '.object.sha')

          echo "Expected SHA : ${EXPECTED_SHA}"
          echo "Actual SHA   : ${ACTUAL_SHA}"

          if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "❌ SHA mismatch for aquasecurity/trivy-action@${{ env.TRIVY_ACTION_VERSION }} – aborting pipeline."
            exit 1
          fi

          echo "✅ SHA verified – aquasecurity/trivy-action@${{ env.TRIVY_ACTION_VERSION }} matches pinned SHA."


      # NEW: Scan docker image via Trivy before push
      - name: Scan docker image via Trivy ${{ env.TRIVY_ACTION_VERSION }}
        uses: aquasecurity/trivy-action@${{ env.TRIVY_ACTION_VERSION }}
        with:
          scan-type: 'image'
          ignore-unfixed: false
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'library,os'
          scan-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true

      # Existing step: only runs if Trivy passed
      - name: Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update docker hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}
          readme-filepath: ./DOCKER-README.md
